<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>📝 To-Do List</h1>

        <form method="POST">
            <input type="text" name="task" placeholder="Enter task..." required>
            <button type="submit">Add</button>
        </form>

        <ul>
            {% for task in tasks %}
                <li>
                    {{ loop.index }}. {{ task }}
                    <a href="/delete/{{ loop.index0 }}">❌</a>
                </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
